services:
  redis:
    image: redis:7-alpine
    container_name: yolo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - yolo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      project: ${PROJECT_NAME}
      service: redis

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV}
    image: yolo-backend:${PROJECT_VERSION}
    container_name: yolo-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: redis://redis:6379
      PORT: ${BACKEND_PORT}
    ports:
      - "${BACKEND_PORT}:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - yolo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/products"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      project: ${PROJECT_NAME}
      service: backend
    depends_on:
      - redis

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV}
    image: yolo-frontend:${PROJECT_VERSION}
    container_name: yolo-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - yolo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      project: ${PROJECT_NAME}
      service: frontend
    depends_on:
      - backend

networks:
  yolo-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET}
          ip_range: ${NETWORK_IP_RANGE}
          gateway: ${NETWORK_GATEWAY}
